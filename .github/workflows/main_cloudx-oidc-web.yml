# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - cloudx-oidc-web

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_PATH: WebApp-OpenIDConnect-DotNet.csproj
  TARGET_FRAMEWORK: net8.0

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build with dotnet
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release -f ${{ env.TARGET_FRAMEWORK }}

      - name: dotnet publish
        run: dotnet publish ${{ env.PROJECT_PATH }} -c Release -f ${{ env.TARGET_FRAMEWORK }} -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FE6332A27C2C4B369F453B8F55DD149C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A5FDC69EC9C044D794B4DE94A833D552 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B9C45D2AF43B4A41A45333AD3A099D42 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cloudx-oidc-web'
          slot-name: 'Production'
          package: .